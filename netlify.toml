[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ----------------------------------------------------------------------------
# Cache-Control headers (Requirements 6.1, 6.2, 6.3, 6.7)
# ----------------------------------------------------------------------------
# Hash-named build assets emitted by Vite live under `/assets/*` and are
# content-addressed; safe to cache forever with `immutable`.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static fonts are also content-addressed and shipped with stable filenames.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# `index.html` and the root path must always be revalidated so users pick up
# new deploys immediately. No `immutable` here on purpose.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Edge function API responses negotiate content-encoding (br/gzip) per
# request, so caches must vary on the `Accept-Encoding` header.
[[headers]]
  for = "/api/*"
  [headers.values]
    Vary = "Accept-Encoding"
