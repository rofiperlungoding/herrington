[build]
  publish = "dist"
  command = "npm run build"

[dev]
  # `command` runs the underlying Vite dev server. We invoke vite
  # directly instead of `npm run dev` so the npm script can map
  # `dev` -> `netlify dev` (which calls back into this command)
  # without creating an infinite loop.
  command = "npm run dev:vite"
  targetPort = 5173
  port = 5174
  framework = "#custom"

[[edge_functions]]
  function = "tasks"
  path = "/api/tasks/*"

[[edge_functions]]
  function = "tasks"
  path = "/api/tasks"

[[edge_functions]]
  function = "habits"
  path = "/api/habits/*"

[[edge_functions]]
  function = "habits"
  path = "/api/habits"

[[edge_functions]]
  function = "chat"
  path = "/api/chat"

[[edge_functions]]
  function = "chat"
  path = "/api/chat/*"

[[edge_functions]]
  function = "ai"
  path = "/api/ai/*"

[[edge_functions]]
  function = "profile"
  path = "/api/profile"

[[edge_functions]]
